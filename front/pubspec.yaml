name: aairbnb
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  image_picker: ^1.1.2
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: CormorantGaramond
      fonts:
        - asset: assets/fonts/CormorantGaramond-Italic-VariableFont_wght.ttf
        - asset: assets/fonts/CormorantGaramond-VariableFont_wght.ttf
          weight: 700
    - family: HankenGrotesk
      fonts:
        - asset: assets/fonts/HankenGrotesk-VariableFont_wght.ttf
        - asset: assets/fonts/HankenGrotesk-Italic-VariableFont_wght.ttf
          style: italic